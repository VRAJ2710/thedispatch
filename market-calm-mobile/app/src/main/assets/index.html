<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Market Calm Check</title><style>body{margin:0;background:#0A0F1E;color:#EDEBF4;font-family:system-ui,sans-serif}header{padding:24px 18px;border-bottom:1px solid #22304F}.brand{font-family:serif;font-size:24px}.brand b{color:#E8A33D}main{padding:16px;max-width:560px;margin:auto}.card{background:#111A31;border:1px solid #22304F;border-radius:16px;padding:18px;margin-bottom:14px}.k{font:700 11px monospace;letter-spacing:2px}.title{font-family:serif;font-size:27px;line-height:1.2}.copy{color:#C9C6D9;line-height:1.55}.bar{height:9px;background:#0C1324;border:1px solid #22304F;border-radius:8px;overflow:hidden}.bar div{height:100%}.row{display:flex;justify-content:space-between;gap:10px}.num{font:700 22px monospace}.btn{width:100%;min-height:46px;background:#E8A33D;color:#0A0F1E;border:0;border-radius:12px;font-weight:800}input[type=range]{width:100%;accent-color:#E8A33D}.chip{background:#0C1324;border:1px solid #22304F;color:#C9C6D9;border-radius:22px;padding:8px 12px;margin:4px}.bubble{padding:10px 13px;border-radius:12px;margin:8px 0;white-space:pre-wrap}.user{background:#E8A33D;color:#0A0F1E;margin-left:20%}.bot{background:#0C1324;border:1px solid #22304F;margin-right:12%}.small{font-size:12px;color:#98A0BC}</style></head><body><header><div class="brand">The <b>Dispatch</b></div><div class="small">Market Calm Check · Android APK</div></header><main><section class="card" id="top"><div class="k" id="label"></div><h1 class="title" id="verdict"></h1><p class="copy" id="meaning"></p><button class="btn" id="live">Check live market now</button><p class="small" id="source">Manual/recent readings until backend is connected.</p></section><section class="card"><h3>The two numbers</h3><div class="row"><span>VIX</span><b class="num" id="vixN"></b></div><div class="bar"><div id="vixB"></div></div><input id="vixR" type="range" min="8" max="60" step="0.1"><div class="row"><span>VIXEQ</span><b class="num" id="vixeqN"></b></div><div class="bar"><div id="vixeqB"></div></div><input id="vixeqR" type="range" min="10" max="80" step="0.1"><p>Gap: <b id="gap"></b></p></section><section class="card"><h3>Beginner reading</h3><div id="tips"></div></section><section class="card"><h3>Ask the analyst</h3><div id="msgs"><p class="small">Chat needs your deployed backend. Dashboard works offline.</p></div><button class="chip">Explain these numbers simply</button><button class="chip">What breaks the calm?</button><button class="chip">What is moving markets?</button><div class="row"><input id="q" placeholder="Ask a question..." style="flex:1;padding:12px;border-radius:10px;background:#0C1324;color:#EDEBF4;border:1px solid #22304F"><button id="ask" class="chip">Ask</button></div></section><p class="small">Educational market observation tool. Not personal financial advice.</p></main><script>let vix=15.9,vixeq=47.6,api=localStorage.marketCalmApiBase||'https://market-calm.thedispatch.uk';function r(){let s=vixeq-vix;if(vix>=28)return['HIGH RISK MOOD','Stormy — on the surface and underneath.','#D4574E','The whole market is nervous and stocks are moving together.',['Do not react impulsively.','Big moves both ways are normal.','Wait for calmer conditions to learn.']];if(vix<20&&s>20)return['HIDDEN MOVEMENT','Calm on the surface. Busy underneath.','#E8A33D','The index looks quiet, but single stocks are moving a lot underneath.',['Index calm can hide stock-level movement.','If stocks start moving together, calm can break quickly.','Good time to watch and learn.']];if(vix<20)return['QUIET MARKET','Genuinely calm.','#4EA57A','The market and the stocks inside it are both settled.',['Moves are smaller and slower.','Calm can create complacency.','Use calm to study before harder conditions.']];return['RISING NERVES','Getting choppier.','#5B8DD9','Nerves are rising from a calm base.',['Expect bigger daily swings.','Watch whether worry spreads.','Compare VIX and VIXEQ over the next days.']]}function $(x){return document.getElementById(x)}function draw(){let a=r(),c=a[2],s=vixeq-vix;$('top').style.borderLeft='4px solid '+c;$('label').textContent=a[0];$('label').style.color=c;$('verdict').textContent=a[1];$('meaning').textContent=a[3];$('vixN').textContent=vix.toFixed(1);$('vixeqN').textContent=vixeq.toFixed(1);$('vixB').style.cssText='width:'+Math.min(100,vix/60*100)+'%;background:#5B8DD9';$('vixeqB').style.cssText='width:'+Math.min(100,vixeq/60*100)+'%;background:'+c;$('gap').textContent=s.toFixed(1);$('vixR').value=vix;$('vixeqR').value=vixeq;$('tips').innerHTML=a[4].map(x=>'<p class="copy">• '+x+'</p>').join('')}$('vixR').oninput=e=>{vix=+e.target.value;draw()};$('vixeqR').oninput=e=>{vixeq=+e.target.value;draw()};$('live').onclick=async()=>{try{let x=await fetch(api+'/api/live-reading'),j=await x.json();if(typeof j.vix==='number'&&typeof j.vixeq==='number'){vix=j.vix;vixeq=j.vixeq;$('source').textContent='Live data from '+api;draw()}}catch(e){$('source').textContent='Backend not connected yet.'}};function bubble(cls,t){$('msgs').innerHTML+='<div class="bubble '+cls+'">'+t.replace(/[<>&]/g,m=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[m]))+'</div>'}async function ask(t){if(!t)return;bubble('user',t);$('q').value='';try{let x=await fetch(api+'/api/ask',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({question:t,vix:vix,vixeq:vixeq,verdict:r()[1]})}),j=await x.json();bubble('bot',j.answer||'No answer returned.')}catch(e){bubble('bot','Analyst backend is not connected yet. Deploy backend at '+api+'.')}}$('ask').onclick=()=>ask($('q').value);$('q').onkeydown=e=>{if(e.key==='Enter')ask($('q').value)};document.querySelectorAll('.chip').forEach(b=>{if(b.id!=='ask')b.onclick=()=>ask(b.textContent)});draw();</script></body></html>
